services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: bifrost_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/var/www/html
    depends_on:
      - database

  apache:
    image: httpd:2.4-alpine
    ports:
      - "8081:443" # HTTPS externo 8081 mapea al 443 interno
    volumes:
      - .:/var/www/html
      - ./server.crt:/usr/local/apache2/conf/server.crt
      - ./server.key:/usr/local/apache2/conf/server.key
      - ./my-httpd-ssl.conf:/usr/local/apache2/conf/httpd.conf 
    depends_on:
      - php

  mercure:
    image: dunglas/mercure
    ports:
      - "3001:80"
    restart: unless-stopped
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: 'tfg_amatista_secure_key_32_chars_'
      MERCURE_SUBSCRIBER_JWT_KEY: 'tfg_amatista_secure_key_32_chars_'
      # ESTAS DOS LÍNEAS SON LAS QUE QUITARÁN EL 401:
      MERCURE_ANONYMOUS: "1" 
      MERCURE_EXTRA_DIRECTIVES: |
        anonymous
        cors_origins https://localhost:8081

  flowise:
    image: flowiseai/flowise:latest
    container_name: tfg-flowise
    restart: always
    environment:
      - PORT=3000
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise
      - LOG_PATH=/root/.flowise
      - CORS_ORIGINS=*
      # AÑADE ESTA LÍNEA PARA PERMITIR LLAMAR A TU APACHE:
      - BLOCKED_HTTP_ADDRESSES=
      - ALLOW_ALL_INTERNAL_IPS=true
      - HTTP_PROXY=
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    ports:
      - "3005:3000"
    volumes:
      - ./flowise_data:/root/.flowise

volumes:
  mercure_data:
  mercure_config:
  db_data: