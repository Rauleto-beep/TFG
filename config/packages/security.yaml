security:
    # 1. Especifica cómo se cifran las contraseñas
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Configura de dónde salen los usuarios
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Usuario # Asegúrate de que este nombre sea exacto
                property: correo           # Aquí le decimos que use el CORREO para el login

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/login_check
            stateless: true
            json_login:
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            # Asegúrate de que el bundle esté bien cargado
            jwt: ~ 

    access_control:
        # Quitamos "requires_channel: https" para que Docker no bloquee la comunicación interna
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        # Esta línea DEBE ir ANTES de la genérica de ^/api
        - { path: ^/api/ai/crear, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/, roles: PUBLIC_ACCESS }