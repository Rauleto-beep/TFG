# config/services.yaml

services:
    # 1. Configuración por defecto para todos los servicios
    _defaults:
        autowire: true      # Inyecta las dependencias automáticamente
        autoconfigure: true # Registra las clases como comandos, listeners, etc.

    # 2. Hace que todas las clases de src/ estén disponibles como servicios
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # 3. Tu Listener personalizado (ahora debajo de la configuración general)
    App\EventListener\JWTCreatedListener:
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_success, method: onAuthenticationSuccessResponse }